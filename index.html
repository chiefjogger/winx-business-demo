<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F1B33" />
  <meta http-equiv="refresh" content="0; url=https://chiefjogger.github.io/winx-platform-demo/" />
  <title>WinX Business · đã chuyển sang winx-platform-demo</title>
  <link rel="canonical" href="https://chiefjogger.github.io/winx-platform-demo/" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23C73E3A'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Inter,sans-serif' font-weight='800' font-size='32' fill='white'>X</text></svg>" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Be Vietnam Pro','Inter',system-ui,-apple-system,sans-serif;
      background:linear-gradient(180deg,#FAFAF6 0%,#F3EFE6 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 24px;
      color:#0F1B33;
    }
    .box{
      max-width:560px;
      background:#fff;
      border:1px solid #ECE6D9;
      border-radius:18px;
      padding:48px 40px;
      text-align:center;
      box-shadow:0 4px 24px rgba(15,27,51,.04);
    }
    .mark{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-weight:800;
      color:#C73E3A;
      font-size:22px;
      margin-bottom:24px;
    }
    .mark-icon{
      display:inline-block;
      width:36px;height:36px;
      background:#C73E3A;
      border-radius:9px;
      position:relative;
    }
    .mark-icon::after{
      content:"X";
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:800;
      font-size:22px;
    }
    h1{
      font-size:24px;
      font-weight:700;
      letter-spacing:-0.01em;
      margin-bottom:14px;
      line-height:1.25;
    }
    p{
      font-size:15px;
      color:#5E5A50;
      line-height:1.6;
      margin-bottom:24px;
    }
    p strong{color:#0F1B33}
    a.cta{
      display:inline-flex;
      align-items:center;
      padding:14px 24px;
      background:#C73E3A;
      color:#fff;
      border-radius:999px;
      font-weight:700;
      font-size:14px;
      text-decoration:none;
      letter-spacing:-0.01em;
    }
    a.cta:hover{background:#A02C28}
    .note{
      font-size:12px;
      color:#8B867D;
      margin-top:18px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="mark">
      <span class="mark-icon"></span>
      <span>WinX Business</span>
    </div>
    <h1>Demo đã chuyển sang trang hợp nhất.</h1>
    <p>Cả <strong>winx-business-demo</strong> và <strong>winx-platform-demo</strong> đã được gộp thành một demo duy nhất: trang thesis (landing) → cockpit live 3 cột.</p>
    <a class="cta" href="https://chiefjogger.github.io/winx-platform-demo/">Mở demo hợp nhất →</a>
    <p class="note">Trang sẽ tự chuyển trong 1 giây.</p>
  </div>
</body>
</html>
